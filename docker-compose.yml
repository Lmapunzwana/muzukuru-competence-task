services:
  backend:
    build:
      context: ./backend
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - SECRET_KEY=dev-secret-key
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - '3000:3000'
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
